name: VPN iperf daily summary

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "集計対象日 JST。空なら今日。例: 2026-05-04"
        required: false
        type: string

concurrency:
  group: vpn-iperf-daily-summary
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Build daily summary
        env:
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          cat > summarize_daily.py <<'PY'
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from statistics import mean

          JST = ZoneInfo("Asia/Tokyo")
          DATA_PATH = Path("data/iperf-results.jsonl")
          EXPECTED_PER_DAY = 12

          def to_float(value):
              if value is None:
                  return None
              try:
                  return float(value)
              except Exception:
                  return None

          def to_int(value):
              if value is None:
                  return None
              try:
                  return int(float(value))
              except Exception:
                  return None

          def avg(values):
              values = [v for v in values if v is not None]
              return mean(values) if values else None

          def minv(values):
              values = [v for v in values if v is not None]
              return min(values) if values else None

          def maxv(values):
              values = [v for v in values if v is not None]
              return max(values) if values else None

          def fmt(value, unit="", digits=1):
              if value is None:
                  return "n/a"
              return f"{value:.{digits}f}{unit}"

          def fmt_delta(current, previous, unit="", lower_is_better=False):
              if current is None or previous is None:
                  return "比較なし"
              delta = current - previous
              if abs(delta) < 0.05:
                  return f"±0.0{unit}（ほぼ同じ）"
              sign = "+" if delta > 0 else ""
              if lower_is_better:
                  label = "改善" if delta < 0 else "悪化"
              else:
                  label = "上昇" if delta > 0 else "低下"
              return f"{sign}{delta:.1f}{unit}（{label}）"

          def load_records():
              if not DATA_PATH.exists():
                  return []
              records = []
              for line in DATA_PATH.read_text(encoding="utf-8").splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      records.append(json.loads(line))
                  except Exception:
                      pass
              return records

          def enrich(records):
              out = []
              for r in records:
                  rr = dict(r)
                  rr["down_mbps_f"] = to_float(r.get("down_mbps"))
                  rr["up_mbps_f"] = to_float(r.get("up_mbps"))
                  rr["ping_f"] = to_float(r.get("tcp_ping_avg_ms"))
                  rr["jitter_f"] = to_float(r.get("tcp_ping_jitter_ms"))
                  rr["ping_stddev_f"] = to_float(r.get("tcp_ping_stddev_ms"))
                  rr["total_mb_f"] = to_float(r.get("total_mb"))
                  rr["down_min_f"] = to_float(r.get("down_min_mbps"))
                  rr["up_min_f"] = to_float(r.get("up_min_mbps"))
                  rr["down_stability_f"] = to_float(r.get("down_stability_pct"))
                  rr["up_stability_f"] = to_float(r.get("up_stability_pct"))
                  rr["hour_i"] = to_int(r.get("hour_jst"))
                  rr["alert_status_norm"] = (r.get("alert_status") or r.get("status") or "UNKNOWN").upper()
                  out.append(rr)
              return out

          def metric_records(records):
              return [
                  r for r in records
                  if r.get("status") == "OK"
                  and r.get("down_mbps_f") is not None
                  and r.get("up_mbps_f") is not None
                  and r.get("ping_f") is not None
              ]

          def alert_counts(records):
              counts = {"OK": 0, "WARNING": 0, "NG": 0, "UNKNOWN": 0}
              for r in records:
                  status = r.get("alert_status_norm") or "UNKNOWN"
                  if status not in counts:
                      status = "UNKNOWN"
                  counts[status] += 1
              return counts

          def summarize(records):
              ok = metric_records(records)
              alerts = alert_counts(records)
              return {
                  "count": len(records),
                  "ok_count": len(ok),
                  "ng_count": len(records) - len(ok),
                  "alert_ok": alerts["OK"],
                  "alert_warning": alerts["WARNING"],
                  "alert_ng": alerts["NG"],
                  "alert_unknown": alerts["UNKNOWN"],
                  "down_avg": avg([r.get("down_mbps_f") for r in ok]),
                  "down_min": minv([r.get("down_mbps_f") for r in ok]),
                  "down_max": maxv([r.get("down_mbps_f") for r in ok]),
                  "up_avg": avg([r.get("up_mbps_f") for r in ok]),
                  "up_min": minv([r.get("up_mbps_f") for r in ok]),
                  "up_max": maxv([r.get("up_mbps_f") for r in ok]),
                  "ping_avg": avg([r.get("ping_f") for r in ok]),
                  "ping_min": minv([r.get("ping_f") for r in ok]),
                  "ping_max": maxv([r.get("ping_f") for r in ok]),
                  "jitter_avg": avg([r.get("jitter_f") for r in ok]),
                  "jitter_max": maxv([r.get("jitter_f") for r in ok]),
                  "down_instant_min": minv([r.get("down_min_f") for r in ok]),
                  "up_instant_min": minv([r.get("up_min_f") for r in ok]),
                  "down_stability_avg": avg([r.get("down_stability_f") for r in ok]),
                  "up_stability_avg": avg([r.get("up_stability_f") for r in ok]),
                  "total_mb": sum([r.get("total_mb_f") or 0 for r in ok]),
              }

          def bucket_summary(records):
              buckets = [
                  ("深夜", "00-05", range(0, 6)),
                  ("朝", "06-11", range(6, 12)),
                  ("昼", "12-17", range(12, 18)),
                  ("夜", "18-23", range(18, 24)),
              ]
              rows = []
              for name, label, hours in buckets:
                  items = [
                      r for r in metric_records(records)
                      if r.get("hour_i") in hours
                  ]
                  rows.append({
                      "name": name,
                      "label": label,
                      "count": len(items),
                      "down_avg": avg([r.get("down_mbps_f") for r in items]),
                      "up_avg": avg([r.get("up_mbps_f") for r in items]),
                      "ping_avg": avg([r.get("ping_f") for r in items]),
                      "jitter_avg": avg([r.get("jitter_f") for r in items]),
                      "down_stability_avg": avg([r.get("down_stability_f") for r in items]),
                      "up_stability_avg": avg([r.get("up_stability_f") for r in items]),
                  })
              return rows

          def best_worst_bucket(rows, key, lower_is_better=False):
              valid = [r for r in rows if r.get("count", 0) > 0 and r.get(key) is not None]
              if len(valid) < 2:
                  return None, None
              if lower_is_better:
                  return min(valid, key=lambda r: r[key]), max(valid, key=lambda r: r[key])
              return max(valid, key=lambda r: r[key]), min(valid, key=lambda r: r[key])

          def record_time(r):
              return r.get("timestamp_jst") or "時刻不明"

          def worst_record(records, key, lower_is_worse=True):
              valid = [r for r in metric_records(records) if r.get(key) is not None]
              if not valid:
                  return None
              return min(valid, key=lambda r: r[key]) if lower_is_worse else max(valid, key=lambda r: r[key])

          target_date = os.environ.get("TARGET_DATE", "").strip()
          if not target_date:
              target_date = datetime.now(JST).strftime("%Y-%m-%d")

          target_dt = datetime.strptime(target_date, "%Y-%m-%d").date()
          prev_date = (target_dt - timedelta(days=1)).strftime("%Y-%m-%d")

          all_records = enrich(load_records())
          day_records = [r for r in all_records if r.get("date_jst") == target_date]
          prev_records = [r for r in all_records if r.get("date_jst") == prev_date]

          s = summarize(day_records)
          p = summarize(prev_records)
          buckets = bucket_summary(day_records)

          down_best, down_worst = best_worst_bucket(buckets, "down_avg", lower_is_better=False)
          up_best, up_worst = best_worst_bucket(buckets, "up_avg", lower_is_better=False)
          ping_best, ping_worst = best_worst_bucket(buckets, "ping_avg", lower_is_better=True)
          jitter_best, jitter_worst = best_worst_bucket(buckets, "jitter_avg", lower_is_better=True)

          worst_down_inst = worst_record(day_records, "down_min_f", lower_is_worse=True)
          worst_up_inst = worst_record(day_records, "up_min_f", lower_is_worse=True)
          worst_ping = worst_record(day_records, "ping_f", lower_is_worse=False)
          worst_jitter = worst_record(day_records, "jitter_f", lower_is_worse=False)

          lines = []
          lines.append("**VPN外部測定 日次サマリー**")
          lines.append("")
          lines.append(f"対象日: {target_date}")
          lines.append(f"測定回数: {s['count']} / 予定{EXPECTED_PER_DAY}回")
          lines.append(f"成功: {s['ok_count']}回 / 失敗: {s['ng_count']}回")
          lines.append(f"判定: OK {s['alert_ok']}回 / WARNING {s['alert_warning']}回 / NG {s['alert_ng']}回 / 不明 {s['alert_unknown']}回")
          lines.append("")
          lines.append("**平均・最高・最低**")
          lines.append(f"TCP Ping平均: {fmt(s['ping_avg'], ' ms')} / 最良 {fmt(s['ping_min'], ' ms')} / 最悪 {fmt(s['ping_max'], ' ms')}")
          lines.append(f"TCP Pingジッター平均: {fmt(s['jitter_avg'], ' ms')} / 最大 {fmt(s['jitter_max'], ' ms')}")
          lines.append(f"下り平均: {fmt(s['down_avg'], ' Mbps')} / 最高 {fmt(s['down_max'], ' Mbps')} / 最低 {fmt(s['down_min'], ' Mbps')}")
          lines.append(f"上り平均: {fmt(s['up_avg'], ' Mbps')} / 最高 {fmt(s['up_max'], ' Mbps')} / 最低 {fmt(s['up_min'], ' Mbps')}")
          lines.append("")
          lines.append("**安定度**")
          lines.append(f"下り最低瞬間: {fmt(s['down_instant_min'], ' Mbps')} / 下り安定度平均: {fmt(s['down_stability_avg'], '%')}")
          lines.append(f"上り最低瞬間: {fmt(s['up_instant_min'], ' Mbps')} / 上り安定度平均: {fmt(s['up_stability_avg'], '%')}")
          lines.append(f"通信量合計: {fmt(s['total_mb'], ' MB')}")
          lines.append("")
          lines.append("**昨日比**")
          lines.append(f"TCP Ping: {fmt_delta(s['ping_avg'], p['ping_avg'], ' ms', lower_is_better=True)}")
          lines.append(f"TCP Pingジッター: {fmt_delta(s['jitter_avg'], p['jitter_avg'], ' ms', lower_is_better=True)}")
          lines.append(f"下り: {fmt_delta(s['down_avg'], p['down_avg'], ' Mbps')}")
          lines.append(f"上り: {fmt_delta(s['up_avg'], p['up_avg'], ' Mbps')}")
          lines.append(f"下り安定度: {fmt_delta(s['down_stability_avg'], p['down_stability_avg'], '%')}")
          lines.append(f"上り安定度: {fmt_delta(s['up_stability_avg'], p['up_stability_avg'], '%')}")
          lines.append("")
          lines.append("**時間帯別平均**")
          for b in buckets:
              lines.append(
                  f"{b['name']}({b['label']}): "
                  f"下り {fmt(b['down_avg'], ' Mbps')} / "
                  f"上り {fmt(b['up_avg'], ' Mbps')} / "
                  f"Ping {fmt(b['ping_avg'], ' ms')} / "
                  f"Jitter {fmt(b['jitter_avg'], ' ms')} / "
                  f"下り安定度 {fmt(b['down_stability_avg'], '%')} / "
                  f"{b['count']}回"
              )

          lines.append("")
          lines.append("**ワースト観測**")
          if worst_down_inst:
              lines.append(f"最低瞬間下り: {fmt(worst_down_inst.get('down_min_f'), ' Mbps')} / {record_time(worst_down_inst)}")
          if worst_up_inst:
              lines.append(f"最低瞬間上り: {fmt(worst_up_inst.get('up_min_f'), ' Mbps')} / {record_time(worst_up_inst)}")
          if worst_ping:
              lines.append(f"最悪Ping: {fmt(worst_ping.get('ping_f'), ' ms')} / {record_time(worst_ping)}")
          if worst_jitter:
              lines.append(f"最大ジッター: {fmt(worst_jitter.get('jitter_f'), ' ms')} / {record_time(worst_jitter)}")

          lines.append("")
          lines.append("**傾向メモ**")

          valid_bucket_count = len([b for b in buckets if b.get("count", 0) > 0])

          if s["ok_count"] == 0:
              lines.append("今日は成功データがまだないため、速度・Ping・安定度の傾向判断は保留。")
          elif s["ok_count"] < 3:
              lines.append(f"今日は成功データが{s['ok_count']}件だけなので、平均値と安定度は参考値。もう少し測定が貯まってから判断する。")
          else:
              lines.append(f"今日は成功データが{s['ok_count']}件あるため、平均値と安定度はある程度参考にできる。")

          if valid_bucket_count < 2:
              lines.append("時間帯比較はデータ不足のため保留。有効な時間帯が2つ以上そろうと、昼が遅い・夜が速いなどの傾向を出す。")
          else:
              if down_best and down_worst:
                  lines.append(f"下りは {down_best['name']} が速め、{down_worst['name']} が遅め。")
              if up_best and up_worst:
                  lines.append(f"上りは {up_best['name']} が速め、{up_worst['name']} が遅め。")
              if ping_best and ping_worst:
                  lines.append(f"Pingは {ping_best['name']} が良好、{ping_worst['name']} が重め。")
              if jitter_best and jitter_worst:
                  lines.append(f"ジッターは {jitter_best['name']} が安定、{jitter_worst['name']} が不安定。")

          if s["alert_warning"] > 0 or s["alert_ng"] > 0:
              lines.append(f"今日は WARNING/NG が合計 {s['alert_warning'] + s['alert_ng']}回あるので、通常通知の該当回を確認するとよさそう。")
          elif s["ok_count"] > 0:
              lines.append("今日は保存済みデータ上では WARNING/NG は出ていない。")

          if not day_records:
              lines = [
                  "**VPN外部測定 日次サマリー**",
                  "",
                  f"対象日: {target_date}",
                  "この日の保存データがまだない。data/iperf-results.jsonl を確認して。",
              ]

          content = "\n".join(lines)

          if len(content) > 1900:
              content = content[:1850] + "\n…（長すぎるので一部省略）"

          Path("daily_summary.txt").write_text(content, encoding="utf-8")
          print(content)
          PY

          python3 summarize_daily.py

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set +e

          if [ ! -f daily_summary.txt ]; then
            echo "**VPN外部測定 日次サマリー NG**" > daily_summary.txt
            echo "" >> daily_summary.txt
            echo "daily_summary.txt が作成されなかった。GitHub Actionsログを確認して。" >> daily_summary.txt
          fi

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord notification."
            exit 0
          fi

          jq -n --rawfile content daily_summary.txt '{content: $content}' > discord_payload.json

          HTTP_CODE="$(curl -sS -o discord_response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @discord_payload.json \
            "$DISCORD_WEBHOOK_URL")"

          echo "Discord HTTP status: $HTTP_CODE"
          cat discord_response.txt || true
