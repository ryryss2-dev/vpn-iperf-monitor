$ErrorActionPreference = "Stop"

Write-Host "=== Locate iperf3.exe installed by winget ==="
$sourceIperf = Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Filter "iperf3.exe" -Recurse -ErrorAction SilentlyContinue |
  Select-Object -First 1

if (-not $sourceIperf) {
  throw "iperf3.exe が見つからない。先に winget install ar51an.iPerf3 を実行して。"
}

$sourceDir = Split-Path $sourceIperf.FullName
$toolDir = "C:\Tools\iperf3"
$scriptDir = "C:\Scripts\VpnIperfMonitor"
$logDir = "C:\Logs\VpnIperfMonitor"
$serverScript = Join-Path $scriptDir "start-iperf3-server.ps1"
$taskName = "VPN iperf3 server 40017"

Write-Host "sourceDir=$sourceDir"
Write-Host "toolDir=$toolDir"

New-Item -ItemType Directory -Force -Path $toolDir, $scriptDir, $logDir | Out-Null

Write-Host "=== Copy iperf3 files to stable path ==="
Copy-Item -Path (Join-Path $sourceDir "*") -Destination $toolDir -Recurse -Force

$stableIperf = Join-Path $toolDir "iperf3.exe"
if (-not (Test-Path $stableIperf)) {
  throw "コピー後の iperf3.exe が見つからない: $stableIperf"
}

Write-Host "=== Create iperf3 server script ==="
@'
$ErrorActionPreference = "Continue"

$Tool = "C:\Tools\iperf3\iperf3.exe"
$Port = 40017
$LogDir = "C:\Logs\VpnIperfMonitor"

New-Item -ItemType Directory -Force -Path $LogDir | Out-Null

$mainLog = Join-Path $LogDir "iperf3-server.log"

function Write-Log($message) {
  $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
  "$ts $message" | Tee-Object -FilePath $mainLog -Append
}

Write-Log "=== iperf3 server wrapper starting ==="
Write-Log "Tool=$Tool Port=$Port"

if (-not (Test-Path $Tool)) {
  Write-Log "ERROR: iperf3.exe not found: $Tool"
  Start-Sleep -Seconds 60
  exit 1
}

try {
  Get-Process iperf3 -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
  Write-Log "Killed existing iperf3 processes, if any."
} catch {
  Write-Log "WARN: failed to kill old iperf3 processes: $($_.Exception.Message)"
}

while ($true) {
  $runStamp = Get-Date -Format "yyyyMMdd_HHmmss"
  $runLog = Join-Path $LogDir "iperf3-server-$runStamp.log"

  Write-Log "Starting iperf3 server on port $Port. runLog=$runLog"

  try {
    & $Tool -s -p $Port 2>&1 | Tee-Object -FilePath $runLog -Append
    $exitCode = $LASTEXITCODE
    Write-Log "iperf3 exited. exitCode=$exitCode"
  } catch {
    Write-Log "ERROR: iperf3 crashed: $($_.Exception.Message)"
  }

  Write-Log "Restarting iperf3 in 5 seconds..."
  Start-Sleep -Seconds 5
}
'@ | Set-Content -Path $serverScript -Encoding UTF8

Write-Host "=== Ensure firewall rules ==="
if (-not (Get-NetFirewallRule -DisplayName "iperf3 TCP 40017" -ErrorAction SilentlyContinue)) {
  New-NetFirewallRule -DisplayName "iperf3 TCP 40017" -Direction Inbound -Protocol TCP -LocalPort 40017 -Action Allow | Out-Null
}

if (-not (Get-NetFirewallRule -DisplayName "iperf3 UDP 40017" -ErrorAction SilentlyContinue)) {
  New-NetFirewallRule -DisplayName "iperf3 UDP 40017" -Direction Inbound -Protocol UDP -LocalPort 40017 -Action Allow | Out-Null
}

Write-Host "=== Register scheduled task ==="
Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue

$action = New-ScheduledTaskAction `
  -Execute "powershell.exe" `
  -Argument "-NoProfile -ExecutionPolicy Bypass -File `"$serverScript`""

$triggerStartup = New-ScheduledTaskTrigger -AtStartup
$triggerLogon = New-ScheduledTaskTrigger -AtLogOn

$principal = New-ScheduledTaskPrincipal `
  -UserId "SYSTEM" `
  -RunLevel Highest

$settings = New-ScheduledTaskSettingsSet `
  -AllowStartIfOnBatteries `
  -DontStopIfGoingOnBatteries `
  -MultipleInstances IgnoreNew `
  -RestartCount 999 `
  -RestartInterval (New-TimeSpan -Minutes 1)

Register-ScheduledTask `
  -TaskName $taskName `
  -Action $action `
  -Trigger @($triggerStartup, $triggerLogon) `
  -Principal $principal `
  -Settings $settings `
  -Description "Run iperf3 server on TCP 40017 for external VPN/line monitoring." | Out-Null

Write-Host "=== Start scheduled task now ==="
Start-ScheduledTask -TaskName $taskName

Start-Sleep -Seconds 3

Write-Host "=== Task status ==="
Get-ScheduledTask -TaskName $taskName | Format-Table TaskName, State

Write-Host "=== Check TCP listener 40017 ==="
Get-NetTCPConnection -LocalPort 40017 -State Listen -ErrorAction SilentlyContinue |
  Format-Table LocalAddress, LocalPort, State, OwningProcess

Write-Host "=== Local iperf3 test ==="
& $stableIperf -c 127.0.0.1 -p 40017 -n 10M

Write-Host "=== Done ==="
Write-Host "Logs: $logDir"
