      - name: Run iperf3 tests
        id: speed
        run: |
          set +e

          HOST="rayglintt11222.softether.net"
          PORT="40017"

          run_iperf_with_retry() {
            local label="$1"
            local output_file="$2"
            shift 2

            local exit_code=1

            for attempt in 1 2 3; do
              echo "=== ${label} attempt ${attempt}/3 ==="
              "$@" --json > "$output_file" 2>"${output_file}.err"
              exit_code=$?

              if [ "$exit_code" -eq 0 ]; then
                echo "${label} succeeded on attempt ${attempt}"
                return 0
              fi

              echo "${label} failed on attempt ${attempt}, exit=${exit_code}"
              echo "--- stderr ---"
              cat "${output_file}.err" || true
              echo "--- json/output ---"
              cat "$output_file" || true
              echo

              sleep 3
            done

            return "$exit_code"
          }

          echo "=== TCP GitHub -> Home / дёӢгӮҠпјҲеӨ–йғЁвҶ’иҮӘе®…пјү ==="
          run_iperf_with_retry \
            "Down еӨ–йғЁвҶ’иҮӘе®…" \
            "tcp_to_home.json" \
            iperf3 -c "$HOST" -p "$PORT" -t 5
          DOWN_EXIT=$?

          sleep 3

          echo "=== TCP Home -> GitHub / дёҠгӮҠпјҲиҮӘе®…вҶ’еӨ–йғЁпјү ==="
          run_iperf_with_retry \
            "Up иҮӘе®…вҶ’еӨ–йғЁ" \
            "tcp_from_home.json" \
            iperf3 -c "$HOST" -p "$PORT" -R -t 5
          UP_EXIT=$?

          DOWN_MBPS=$(jq -r '(.end.sum_sent.bits_per_second // .end.sum_received.bits_per_second // 0) / 1000000' tcp_to_home.json 2>/dev/null)
          UP_MBPS=$(jq -r '(.end.sum_received.bits_per_second // .end.sum_sent.bits_per_second // 0) / 1000000' tcp_from_home.json 2>/dev/null)

          DOWN_MBPS_ROUNDED=$(printf "%.1f" "$DOWN_MBPS")
          UP_MBPS_ROUNDED=$(printf "%.1f" "$UP_MBPS")

          echo "--------------------------------"
          echo "дёӢгӮҠпјҲеӨ–йғЁвҶ’иҮӘе®…пјүMbps: $DOWN_MBPS_ROUNDED"
          echo "дёҠгӮҠпјҲиҮӘе®…вҶ’еӨ–йғЁпјүMbps: $UP_MBPS_ROUNDED"
          echo "Down exit: $DOWN_EXIT"
          echo "Up exit:   $UP_EXIT"
          echo "--------------------------------"

          echo "down_mbps=$DOWN_MBPS_ROUNDED" >> "$GITHUB_OUTPUT"
          echo "up_mbps=$UP_MBPS_ROUNDED" >> "$GITHUB_OUTPUT"
          echo "down_exit=$DOWN_EXIT" >> "$GITHUB_OUTPUT"
          echo "up_exit=$UP_EXIT" >> "$GITHUB_OUTPUT"

          if [ "$DOWN_EXIT" -ne 0 ] || [ "$UP_EXIT" -ne 0 ]; then
            echo "iperf3 failed after retries"
            exit 1
          fi
